name: Wakeup Claude

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wakeup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude for all tokens
        env:
          TOKENS_JSON: ${{ secrets.CLAUDE_CODE_OAUTH_TOKENS }}
        run: |
          set -euo pipefail
          if [ -z "${TOKENS_JSON:-}" ]; then
            echo "::error::Secret CLAUDE_CODE_OAUTH_TOKENS is not set"
            exit 1
          fi
          LENGTH=$(printf '%s' "$TOKENS_JSON" | jq 'length')
          for i in $(seq 0 $((LENGTH - 1))); do
            TOKEN=$(printf '%s' "$TOKENS_JSON" | jq -r ".[$i]")
            echo "::add-mask::$TOKEN"
            CLAUDE_CODE_OAUTH_TOKEN="$TOKEN" claude -p "hi" --model haiku --max-turns 1
          done
