name: Wakeup Claude

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build index matrix from token array
        id: set-matrix
        env:
          TOKENS_JSON: ${{ secrets.CLAUDE_CODE_OAUTH_TOKENS }}
        run: |
          set -euo pipefail
          if [ -z "${TOKENS_JSON:-}" ]; then
            echo "::error::Secret CLAUDE_CODE_OAUTH_TOKENS is not set"
            exit 1
          fi
          INDICES=$(printf '%s' "$TOKENS_JSON" | jq -c '[range(length)]')
          echo "matrix=$INDICES" >> "$GITHUB_OUTPUT"

  wakeup:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        index: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Resolve OAuth token from JSON array
        env:
          TOKENS_JSON: ${{ secrets.CLAUDE_CODE_OAUTH_TOKENS }}
          INDEX: ${{ matrix.index }}
        run: |
          set -euo pipefail
          TOKEN=$(printf '%s' "$TOKENS_JSON" | jq -r --argjson i "$INDEX" '.[$i]')
          echo "::add-mask::$TOKEN"
          echo "CLAUDE_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Run Claude (haiku, prompt='hi')
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_TOKEN }}
          prompt: "hi"
          claude_args: |
            --model haiku
            --max-turns 1
